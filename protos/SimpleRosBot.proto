#VRML_SIM R2025a utf8

# Simple differential-drive training robot for the Webots starter worlds.
# This is not the official course RosBot model. It is only used to learn the
# controller workflow until the official Moodle worlds are available.

PROTO SimpleRosBot [
  field SFVec3f translation 0 0.14 0
  field SFRotation rotation 0 1 0 0
  field SFString controller "rosbot_navigation"
]
{
  Robot {
    translation IS translation
    rotation IS rotation
    controller IS controller
    name "RosBot"
    children [
      GPS { name "gps" }
      Compass { name "compass" }
      Camera {
        name "camera"
        translation 0 0.16 -0.22
        width 320
        height 240
        fieldOfView 1.2
      }
      Lidar {
        name "lidar"
        translation 0 0.18 0
        horizontalResolution 181
        numberOfLayers 1
        fieldOfView 3.14159
        minRange 0.05
        maxRange 8
      }

      # Narrow chassis. The wheels are outside this body, so their bounding
      # objects do not intersect the chassis at reset.
      Shape {
        appearance PBRAppearance {
          baseColor 0.08 0.18 0.85
          roughness 0.6
          metalness 0
        }
        geometry Box { size 0.24 0.12 0.30 }
      }

      # Wheel radius = 0.055 m. Robot y=0.14 and local wheel y=-0.085 gives
      # wheel center y=0.055 m, exactly touching the floor.
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 1 0 0
          anchor -0.18 -0.085 -0.11
        }
        device [ RotationalMotor { name "front left wheel motor" maxVelocity 20 maxTorque 2 } ]
        endPoint Solid {
          translation -0.18 -0.085 -0.11
          rotation 0 0 1 1.5708
          children [
            Shape {
              appearance PBRAppearance { baseColor 0.02 0.02 0.02 roughness 1 }
              geometry Cylinder { radius 0.055 height 0.035 }
            }
          ]
          name "front left wheel"
          boundingObject Cylinder { radius 0.055 height 0.035 }
          physics Physics { density 700 }
        }
      }
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 1 0 0
          anchor 0.18 -0.085 -0.11
        }
        device [ RotationalMotor { name "front right wheel motor" maxVelocity 20 maxTorque 2 } ]
        endPoint Solid {
          translation 0.18 -0.085 -0.11
          rotation 0 0 1 1.5708
          children [
            Shape {
              appearance PBRAppearance { baseColor 0.02 0.02 0.02 roughness 1 }
              geometry Cylinder { radius 0.055 height 0.035 }
            }
          ]
          name "front right wheel"
          boundingObject Cylinder { radius 0.055 height 0.035 }
          physics Physics { density 700 }
        }
      }
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 1 0 0
          anchor -0.18 -0.085 0.11
        }
        device [ RotationalMotor { name "rear left wheel motor" maxVelocity 20 maxTorque 2 } ]
        endPoint Solid {
          translation -0.18 -0.085 0.11
          rotation 0 0 1 1.5708
          children [
            Shape {
              appearance PBRAppearance { baseColor 0.02 0.02 0.02 roughness 1 }
              geometry Cylinder { radius 0.055 height 0.035 }
            }
          ]
          name "rear left wheel"
          boundingObject Cylinder { radius 0.055 height 0.035 }
          physics Physics { density 700 }
        }
      }
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 1 0 0
          anchor 0.18 -0.085 0.11
        }
        device [ RotationalMotor { name "rear right wheel motor" maxVelocity 20 maxTorque 2 } ]
        endPoint Solid {
          translation 0.18 -0.085 0.11
          rotation 0 0 1 1.5708
          children [
            Shape {
              appearance PBRAppearance { baseColor 0.02 0.02 0.02 roughness 1 }
              geometry Cylinder { radius 0.055 height 0.035 }
            }
          ]
          name "rear right wheel"
          boundingObject Cylinder { radius 0.055 height 0.035 }
          physics Physics { density 700 }
        }
      }
    ]
    boundingObject Box { size 0.24 0.12 0.30 }
    physics Physics { density 850 }
  }
}
