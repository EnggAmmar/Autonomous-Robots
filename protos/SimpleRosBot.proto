#VRML_SIM R2025a utf8

# Simple differential-drive training robot for the Webots starter worlds.
# This is not the official course RosBot model. It is only used to learn the
# controller workflow until the official Moodle worlds are available.

PROTO SimpleRosBot [
  field SFVec3f translation 0 0.13 0
  field SFRotation rotation 0 1 0 0
  field SFString controller "rosbot_navigation"
]
{
  Robot {
    translation IS translation
    rotation IS rotation
    controller IS controller
    name "RosBot"
    children [
      GPS {
        name "gps"
      }
      Compass {
        name "compass"
      }
      Camera {
        name "camera"
        translation 0 0.14 -0.20
        width 320
        height 240
        fieldOfView 1.2
      }
      Lidar {
        name "lidar"
        translation 0 0.16 0
        horizontalResolution 181
        numberOfLayers 1
        fieldOfView 3.14159
        minRange 0.05
        maxRange 8
      }

      # Main robot chassis. The body is slightly above the wheel centers.
      Shape {
        appearance PBRAppearance {
          baseColor 0.08 0.18 0.85
          roughness 0.6
          metalness 0
        }
        geometry Box {
          size 0.36 0.12 0.30
        }
      }

      # Wheel radius is 0.055 m. With robot translation y=0.13 and local wheel
      # center y=-0.075, wheel center height becomes 0.055 m, so the wheels touch
      # the floor instead of floating or intersecting it.
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 1 0 0
          anchor -0.16 -0.075 -0.11
        }
        device [
          RotationalMotor {
            name "front left wheel motor"
            maxVelocity 20
            maxTorque 5
          }
        ]
        endPoint Solid {
          translation -0.16 -0.075 -0.11
          rotation 0 0 1 1.5708
          children [
            Shape {
              appearance PBRAppearance { baseColor 0.02 0.02 0.02 roughness 0.8 }
              geometry Cylinder { radius 0.055 height 0.045 }
            }
          ]
          name "front left wheel"
          boundingObject Cylinder { radius 0.055 height 0.045 }
          physics Physics { mass 0.12 }
        }
      }
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 1 0 0
          anchor 0.16 -0.075 -0.11
        }
        device [
          RotationalMotor {
            name "front right wheel motor"
            maxVelocity 20
            maxTorque 5
          }
        ]
        endPoint Solid {
          translation 0.16 -0.075 -0.11
          rotation 0 0 1 1.5708
          children [
            Shape {
              appearance PBRAppearance { baseColor 0.02 0.02 0.02 roughness 0.8 }
              geometry Cylinder { radius 0.055 height 0.045 }
            }
          ]
          name "front right wheel"
          boundingObject Cylinder { radius 0.055 height 0.045 }
          physics Physics { mass 0.12 }
        }
      }
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 1 0 0
          anchor -0.16 -0.075 0.11
        }
        device [
          RotationalMotor {
            name "rear left wheel motor"
            maxVelocity 20
            maxTorque 5
          }
        ]
        endPoint Solid {
          translation -0.16 -0.075 0.11
          rotation 0 0 1 1.5708
          children [
            Shape {
              appearance PBRAppearance { baseColor 0.02 0.02 0.02 roughness 0.8 }
              geometry Cylinder { radius 0.055 height 0.045 }
            }
          ]
          name "rear left wheel"
          boundingObject Cylinder { radius 0.055 height 0.045 }
          physics Physics { mass 0.12 }
        }
      }
      HingeJoint {
        jointParameters HingeJointParameters {
          axis 1 0 0
          anchor 0.16 -0.075 0.11
        }
        device [
          RotationalMotor {
            name "rear right wheel motor"
            maxVelocity 20
            maxTorque 5
          }
        ]
        endPoint Solid {
          translation 0.16 -0.075 0.11
          rotation 0 0 1 1.5708
          children [
            Shape {
              appearance PBRAppearance { baseColor 0.02 0.02 0.02 roughness 0.8 }
              geometry Cylinder { radius 0.055 height 0.045 }
            }
          ]
          name "rear right wheel"
          boundingObject Cylinder { radius 0.055 height 0.045 }
          physics Physics { mass 0.12 }
        }
      }
    ]
    boundingObject Box {
      size 0.36 0.12 0.30
    }
    physics Physics {
      mass 2.5
      density -1
    }
  }
}
